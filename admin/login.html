<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Área Administrativa | Roberta Lopes</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
<div class="admin-center">
  <div class="admin-card">
    <h1>Área Administrativa</h1>
    <p class="sub">Entre com seu e-mail e senha para gerenciar o site.</p>

    <div id="msg" class="admin-msg"></div>

    <form id="formLogin">
      <div class="admin-field">
        <label>E-mail</label>
        <input type="email" id="email" required>
      </div>
      <div class="admin-field">
        <label>Senha</label>
        <input type="password" id="senha" required>
      </div>
      <button type="submit" class="admin-btn">Entrar</button>
    </form>
    <button class="admin-link" id="btnEsqueci">Esqueci minha senha</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script>
  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const msg = document.getElementById('msg');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'admin-msg ' + type;
  }

  // Se já está logado, manda direto pro painel
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    if (error) {
      showMsg('E-mail ou senha incorretos.', 'error');
      return;
    }
    window.location.href = 'dashboard.html';
  });

  document.getElementById('btnEsqueci').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showMsg('Digite seu e-mail no campo acima primeiro.', 'error');
      return;
    }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/admin/set-password.html'
    });
    if (error) {
      showMsg('Não foi possível enviar o e-mail de redefinição.', 'error');
    } else {
      showMsg('Enviamos um link de redefinição de senha para seu e-mail.', 'success');
    }
  });
</script>
</body>
</html>
