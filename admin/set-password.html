<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definir senha — Roberta Lopes</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
<div class="admin-center">
  <div class="admin-card">
    <h1>Definir senha</h1>
    <p class="sub" id="subText">Carregando convite...</p>

    <div id="msg" class="admin-msg"></div>

    <form id="formSenha" style="display:none;">
      <div class="admin-field">
        <label>Nova senha</label>
        <input type="password" id="senha" minlength="6" required>
      </div>
      <div class="admin-field">
        <label>Confirme a senha</label>
        <input type="password" id="senha2" minlength="6" required>
      </div>
      <button type="submit" class="admin-btn">Salvar senha e entrar</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script>
  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const msg = document.getElementById('msg');
  const subText = document.getElementById('subText');
  const form = document.getElementById('formSenha');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'admin-msg ' + type;
  }

  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      subText.textContent = 'Convite confirmado. Defina sua senha de acesso.';
      form.style.display = 'block';
    } else {
      subText.textContent = 'Link inválido ou expirado. Peça um novo convite ao administrador.';
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const senha = document.getElementById('senha').value;
    const senha2 = document.getElementById('senha2').value;
    if (senha !== senha2) {
      showMsg('As senhas não coincidem.', 'error');
      return;
    }
    const { error } = await sb.auth.updateUser({ password: senha });
    if (error) {
      showMsg('Não foi possível salvar a senha: ' + error.message, 'error');
      return;
    }
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
